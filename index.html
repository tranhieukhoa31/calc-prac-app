<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculus Practice</title>

<script>
MathJax = {
  tex: { packages: {'[+]': ['ams']} },
  loader: { load: ['[tex]/ams'] },
  startup: { typeset: false }

</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@600&family=JetBrains+Mono:wght@400&display=swap');

:root {
  --bg:        #f7f6f3;
  --bg2:       #efeee9;
  --border:    #d8d5cc;
  --ink:       #1a1a1a;
  --ink2:      #555550;
  --ink3:      #999990;
  --accent:    #4a6fa5;
  --correct:   #2e7d52;
  --incorrect: #b84040;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

.app { display: flex; height: 100vh; overflow: hidden; }

.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto;
}

.sidebar-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-family: 'Lora', serif;
  font-size: 15px; font-weight: 600;
}
.sidebar-header p { font-size: 11px; color: var(--ink3); margin-top: 2px; }

.student-bar {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.student-bar label {
  font-size: 11px; color: var(--ink3);
  display: block; margin-bottom: 4px;
}
.student-bar input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 4px; padding: 6px 8px;
  font-size: 12px; font-family: 'Inter', sans-serif;
  background: white; color: var(--ink); outline: none;
}
.student-bar input:focus { border-color: var(--accent); }

.sidebar-section {
  padding: 12px 16px 4px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--ink3);
}

.topic-list { padding: 2px 0 6px; }
.topic-item {
  padding: 6px 16px;
  font-size: 12px; color: var(--ink2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.1s;
}
.topic-item:hover { background: var(--bg2); }
.topic-item.active {
  background: var(--bg2); color: var(--ink);
  font-weight: 500;
  border-left: 2px solid var(--accent);
  padding-left: 14px;
}
.topic-count { font-size: 10px; color: var(--ink3); }

.diff-filter {
  padding: 4px 16px 12px;
  display: flex; gap: 4px;
}
.diff-btn {
  flex: 1; padding: 4px 2px; text-align: center;
  font-size: 11px; cursor: pointer;
  border: 1px solid var(--border);
  border-radius: 3px; color: var(--ink3);
  background: white; transition: all 0.1s;
}
.diff-btn:hover { border-color: var(--accent); color: var(--accent); }
.diff-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

.stats-box {
  margin: 4px 16px 16px;
  border: 1px solid var(--border);
  border-radius: 4px; padding: 10px 12px;
  background: white;
}
.stats-box h4 {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--ink3); margin-bottom: 8px;
}
.stat-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
.stat-label { font-size: 11px; color: var(--ink2); }
.stat-val   { font-size: 12px; font-weight: 600; color: var(--ink); }

.main {
  flex: 1; overflow-y: auto;
  padding: 40px 32px 80px;
  display: flex; flex-direction: column;
  align-items: center;
}

.card-wrap { width: 100%; max-width: 620px; }

.progress-meta {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--ink3); margin-bottom: 16px;
}

.problem-card {
  background: white;
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
  padding: 28px 32px;
  min-width: 0;
}

.card-meta {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--bg2);
}
.topic-label { font-size: 11px; color: var(--accent); font-weight: 500; }
.diff-label  { font-size: 11px; color: var(--ink3); }
.problem-id  {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink3); margin-left: auto;
}

/* MathJax output sits inside these containers */
.problem-statement {
  font-size: 16px;
  line-height: 1.8;
  color: var(--ink);
  margin-bottom: 24px;
  min-height: 40px;
}
.problem-statement mjx-container {
  display: inline !important;
  white-space: normal !important;
  overflow-wrap: break-word !important;
  word-break: break-word !important;
}
/* Force MathJax text spans to wrap */
.problem-statement mjx-container svg {
  max-width: 100% !important;
  height: auto !important;
}
.problem-statement mjx-utext,
.problem-statement mjx-mtext {
  white-space: normal !important;
  overflow-wrap: break-word !important;
}

.timer {
  font-size: 11px; color: var(--ink3);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 20px;
}

.hints-area { margin-bottom: 18px; }
.hint-item {
  border-left: 2px solid var(--border);
  padding: 8px 12px; margin-bottom: 8px;
  font-size: 13px; color: var(--ink2);
  background: var(--bg); border-radius: 0 3px 3px 0;
}
.hint-item strong {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--ink3); display: block; margin-bottom: 2px;
}

.action-row {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding-top: 4px;
}

.btn {
  padding: 8px 16px; border-radius: 3px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: 'Inter', sans-serif;
  transition: all 0.1s;
  border: 1px solid var(--border);
  background: white; color: var(--ink2);
}
.btn:hover:not(:disabled) { border-color: var(--ink3); color: var(--ink); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-correct  { border-color: var(--correct); color: var(--correct); }
.btn-correct:hover:not(:disabled)  { background: var(--correct); color: white; }

.btn-incorrect { border-color: var(--incorrect); color: var(--incorrect); }
.btn-incorrect:hover:not(:disabled) { background: var(--incorrect); color: white; }

.btn-next {
  margin-left: auto;
  background: var(--accent); border-color: var(--accent); color: white;
}
.btn-next:hover:not(:disabled) { background: #3d5e8e; border-color: #3d5e8e; }

.answer-box {
  margin-top: 20px; padding: 16px 18px;
  border: 1px solid var(--border);
  border-radius: 3px; background: var(--bg);
}
.answer-box h4 {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--ink3); margin-bottom: 10px;
}

.steps-list { margin-top: 14px; }
.step-item {
  display: flex; gap: 10px;
  padding: 8px 0; border-top: 1px solid var(--border);
  align-items: flex-start;
}
.step-num {
  flex-shrink: 0; font-size: 10px; color: var(--ink3);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 3px; min-width: 18px;
}
.step-expl { font-size: 12px; color: var(--ink3); margin-top: 4px; }

.feedback {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  padding: 8px 18px; border-radius: 3px;
  font-size: 13px; font-weight: 500;
  border: 1px solid; background: white;
  pointer-events: none; transition: opacity 0.3s; z-index: 100;
}
.feedback.correct   { color: var(--correct);   border-color: var(--correct); }
.feedback.incorrect { color: var(--incorrect); border-color: var(--incorrect); }
.feedback.hidden    { opacity: 0; }

.save-status {
  font-size: 11px; color: var(--ink3);
  margin-top: 6px; text-align: right; min-height: 16px;
}
.save-status.saved  { color: var(--correct); }
.save-status.failed { color: var(--incorrect); }

.log-wrap { width: 100%; max-width: 620px; margin-top: 32px; }
.log-header {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--ink3); margin-bottom: 8px;
}
.log-table {
  width: 100%; border-collapse: collapse;
  background: white;
  border: 1px solid var(--border); border-radius: 3px; overflow: hidden;
}
.log-table th {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--ink3); text-align: left;
  padding: 7px 10px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
}
.log-table td {
  padding: 6px 10px; font-size: 12px; color: var(--ink2);
  border-bottom: 1px solid var(--bg2);
}
.log-table tr:last-child td { border-bottom: none; }
.r-correct   { color: var(--correct);   font-weight: 600; }
.r-incorrect { color: var(--incorrect); font-weight: 600; }

.export-btn {
  margin-top: 10px;
  border: 1px solid var(--border); background: white; color: var(--ink2);
  font-size: 12px; padding: 6px 12px; border-radius: 3px;
  cursor: pointer; font-family: 'Inter', sans-serif;
}
.export-btn:hover { border-color: var(--ink3); color: var(--ink); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--ink3); }

@media (max-width: 680px) {
  .sidebar { display: none; }
  .main { padding: 20px 16px 60px; }
  .problem-card { padding: 20px 18px; }
}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Calculus Practice</h1>
      <p>Secondary 4 &middot; 62 problems</p>
    </div>

    <div class="student-bar">
      <label for="studentId">Name or ID</label>
      <input type="text" id="studentId" placeholder="e.g. Alice">
    </div>

    <div class="sidebar-section">Topic</div>
    <div class="topic-list" id="topicList"></div>

    <div class="sidebar-section">Difficulty</div>
    <div class="diff-filter" id="diffFilter">
      <div class="diff-btn active" data-diff="0">Any</div>
      <div class="diff-btn" data-diff="1">1</div>
      <div class="diff-btn" data-diff="2">2</div>
      <div class="diff-btn" data-diff="3">3</div>
      <div class="diff-btn" data-diff="4">4</div>
    </div>

    <div class="stats-box">
      <h4>Session</h4>
      <div class="stat-row"><span class="stat-label">Attempted</span><span class="stat-val" id="statAttempted">0</span></div>
      <div class="stat-row"><span class="stat-label">Correct</span><span class="stat-val" id="statCorrect">0</span></div>
      <div class="stat-row"><span class="stat-label">Accuracy</span><span class="stat-val" id="statAccuracy">—</span></div>
      <div class="stat-row"><span class="stat-label">Hints used</span><span class="stat-val" id="statHints">0</span></div>
    </div>
  </aside>

  <main class="main" id="mainArea"></main>
</div>

<div class="feedback hidden" id="feedback"></div>

<script>
const PROBLEMS    = [{"problem_id": "calc_deriv_001", "topic": "derivatives_basics", "subtopic": "power_rule", "difficulty": 1, "problem_type": "computation", "prerequisites": ["algebra_functions"], "common_errors": ["not reducing the power by 1", "treating a constant term as having a derivative"], "hint_level_1": "Apply the power rule to each term separately.", "hint_level_2": "For x\u207f, bring the power down and reduce it by 1.", "hint_level_3": "d/dx(4x\u00b3) = 3\u00b74x\u00b2 = 12x\u00b2.", "statement_latex": "\\text{Differentiate } f(x) = 4x^3 - 5x^2 + 7", "answer_latex": "f'(x) = 12x^2 - 10x", "solution_steps": [{"step_latex": "\\frac{d}{dx}(4x^3) = 12x^2", "explanation": "Power rule on first term"}, {"step_latex": "\\frac{d}{dx}(-5x^2) = -10x", "explanation": "Power rule on second term"}, {"step_latex": "\\frac{d}{dx}(7) = 0", "explanation": "Derivative of a constant is zero"}, {"step_latex": "f'(x) = 12x^2 - 10x", "explanation": "Combine"}], "estimated_time_min": 3, "tags": ["power_rule", "polynomial"]}, {"problem_id": "calc_deriv_002", "topic": "derivatives_basics", "subtopic": "negative_fractional_powers", "difficulty": 2, "problem_type": "computation", "prerequisites": ["algebra_functions"], "common_errors": ["not rewriting the root as a fractional power before differentiating", "sign error on negative power"], "hint_level_1": "Rewrite the expression using index notation before differentiating.", "hint_level_2": "\u221ax = x^(1/2) and 1/x\u00b2 = x\u207b\u00b2.", "hint_level_3": "d/dx(x^(1/2)) = (1/2)x^(-1/2).", "statement_latex": "\\text{Differentiate } y = \\sqrt{x} + \\frac{1}{x^2}", "answer_latex": "\\frac{dy}{dx} = \\frac{1}{2}x^{-1/2} - 2x^{-3}", "solution_steps": [{"step_latex": "y = x^{1/2} + x^{-2}", "explanation": "Rewrite using index form"}, {"step_latex": "\\frac{dy}{dx} = \\frac{1}{2}x^{-1/2} + (-2)x^{-3}", "explanation": "Power rule on each term"}, {"step_latex": "= \\frac{1}{2\\sqrt{x}} - \\frac{2}{x^3}", "explanation": "Rewrite in conventional form (optional)"}], "estimated_time_min": 4, "tags": ["power_rule", "index_notation", "negative_powers", "fractional_powers"]}, {"problem_id": "calc_deriv_010", "topic": "product_quotient_rule", "subtopic": "product_rule", "difficulty": 2, "problem_type": "computation", "prerequisites": ["derivatives_basics"], "common_errors": ["multiplying derivatives instead of using the product rule", "sign errors"], "hint_level_1": "This is a product of two functions \u2014 identify u and v.", "hint_level_2": "Use (uv)' = u'v + uv'.", "hint_level_3": "u = x\u00b2, u' = 2x; v = sin x, v' = cos x.", "statement_latex": "\\text{Differentiate } y = x^2 \\sin x", "answer_latex": "\\frac{dy}{dx} = 2x\\sin x + x^2 \\cos x", "solution_steps": [{"step_latex": "u = x^2,\\ v = \\sin x", "explanation": "Identify the two factors"}, {"step_latex": "u' = 2x,\\ v' = \\cos x", "explanation": "Differentiate each separately"}, {"step_latex": "\\frac{dy}{dx} = 2x\\sin x + x^2\\cos x", "explanation": "Apply (uv)' = u'v + uv'"}], "estimated_time_min": 4, "tags": ["product_rule", "trig"]}, {"problem_id": "calc_deriv_011", "topic": "product_quotient_rule", "subtopic": "quotient_rule", "difficulty": 3, "problem_type": "computation", "prerequisites": ["derivatives_basics"], "common_errors": ["reversing numerator order: v'u - u'v instead of u'v - uv'", "forgetting to square the denominator"], "hint_level_1": "This is a fraction of two functions \u2014 use the quotient rule.", "hint_level_2": "dy/dx = (u'v \u2212 uv') / v\u00b2.", "hint_level_3": "u = x\u00b2, u' = 2x; v = x+1, v' = 1.", "statement_latex": "\\text{Differentiate } y = \\frac{x^2}{x+1}", "answer_latex": "\\frac{dy}{dx} = \\frac{x^2 + 2x}{(x+1)^2}", "solution_steps": [{"step_latex": "u = x^2,\\ v = x+1,\\ u' = 2x,\\ v' = 1", "explanation": "Identify and differentiate numerator and denominator"}, {"step_latex": "\\frac{dy}{dx} = \\frac{2x(x+1) - x^2 \\cdot 1}{(x+1)^2}", "explanation": "Apply quotient rule"}, {"step_latex": "= \\frac{2x^ } = x,\\ \\text{length} = y", "explanation": "Define variables"}, {"step_latex": "2x + y = 100 \\implies y = 100 - 2x", "explanation": "Fencing constraint (3 sides)"}, {"step_latex": "A(x) = x(100-2x) = 100x - 2x^2", "explanation": "Area in one variable"}, {"step_latex": "A'(x) = 100 - 4x = 0 \\implies x = 25", "explanation": "Set derivative to zero and solve"}, {"step_latex": "y = 50,\\ A = 1250 \\text{ m}^2", "explanation": "Compute dimensions and area"}], "estimated_time_min": 10, "tags": ["real_world", "constraint", "optimisation", "exam_style"]}, {"problem_id": "calc_app_011", "topic": "rates_of_change", "subtopic": "related_rates", "difficulty": 3, "problem_type": "application", "prerequisites": ["chain_rule", "trig_derivatives"], "common_errors": ["confusing dy/dt with dy/dx", "not applying chain rule to differentiate with respect to t"], "hint_level_1": "You need to find how fast something changes over time \u2014 differentiate with respect to t.", "hint_level_2": "Use the chain rule: dy/dt = (dy/dx) \u00d7 (dx/dt).", "hint_level_3": "dy/dx = 3x\u00b2, and dx/dt = 2. Substitute x = 1.", "statement_latex": "y = x^3. \\text{ If } \\frac{dx}{dt} = 2 \\text{ when } x = 1, \\text{ find } \\frac{dy}{dt}.", "answer_latex": "\\frac{dy}{dt} = 6", "solution_steps": [{"step_latex": "\\frac{dy}{dt} = \\frac{dy}{dx} \\cdot \\frac{dx}{dt}", "explanation": "Chain rule with respect to t"}, {"step_latex": "\\frac{dy}{dx} = 3x^2", "explanation": "Differentiate y = x\u00b3"}, {"step_latex": "\\frac{dy}{dt} = 3(1)^2 \\cdot 2 = 6", "explanation": "Substitute x = 1 and dx/dt = 2"}], "estimated_time_min": 6, "tags": ["related_rates", "chain_rule", "rates_of_change"]}, {"problem_id": "calc_int_001", "topic": "integration_basics", "subtopic": "indefinite_integral_power", "difficulty": 1, "problem_type": "computation", "prerequisites": ["derivatives_basics"], "common_errors": ["forgetting +C", "adding 1 to power but not dividing by the new power"], "hint_level_1": "Use the power rule // ── MathJax: convert a LaTeX string directly to a DOM node ────────────────
// This avoids all delimiter scanning issues entirely.
// We wait for MathJax to be ready before calling tex2chtml.
function latexToNode(tex, display) {
  if (!window.MathJax || !MathJax.tex2chtml) {
    // MathJax not ready yet — return plain text as fallback
    const span = document.createElement('span');
    span.textContent = tex;
    return span;
  }
  try {
    const node = MathJax.tex2chtml(tex, { display: display || false });
    // tex2chtml updates internal styles; apply them to document
    MathJax.startup.document.clear();
    MathJax.startup.document.updateDocument();
    return node;
  } catch (e) {
    const span = document.createElement('span');
    span.textContent = tex;
    return span;
  }
}

// Inject LaTeX into a container element by id
function renderLatex(containerId, tex, display) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';
  el.appendChild(latexToNode(tex, display));
}

    el.innerHTML     = `<span>${TOPIC_LABELS[key] || key}</span><span class="topic-count">${counts[key] || 0}</span>`;
    el.addEventListener('click', () => selectTopic(key));
    list.appendChild(el);
  });
}

function selectTopic(topic) {
  selectedTopic = topic;
  document.querySelectorAll('.topic-item').forEach(el =>
    el.classList.toggle('active', el.dataset.topic === topic));
  loadNextProblem();
}

// ── Difficulty filter ─────────────────────────────────────────────────────
document.getElementById('diffFilter').addEventListener('click', e => {
  const btn = e.target.closest('.diff-btn');
  if (!btn) return;
  selectedDiff = +btn.dataset.diff;
  document.querySelectorAll('.diff-btn').forEach(b =>
    b.classList.toggle('active', b === btn));
  loadNextProblem();
});

// ── Problem pool ──────────────────────────────────────────────────────────
function getPool() {
  let pool = PROBLEMS;
  if (selectedTopic !== 'all') pool = pool.filter(p => p.topic === selectedTopic);
  if (selectedDiff > 0)        pool = pool.filter(p => p.difficulty === selectedDiff);
  return pool;
}

function pickProblem() {
  const pool = getPool();
  if (!pool.length) return null;
  const attCounts = {};
  attempts.forEach(a => { attCounts[a.problem_id] = (attCounts[a.problem_id] || 0) + 1; });
  const weights = pool.map(p => 1 / (1 + (attCounts[p.problem_id] || 0)));
  const total   = weights.reduce((s, w) => s + w, 0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r <= 0) return pool[i];
  }
  return pool[pool.length - 1];
}

// ── Timer ─────────────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  timerSeconds = 0;
  updateTimer();
  timerInterval = setInterval(() => { timerSeconds++; updateTimer(); }, 1000);
}
function stopTimer() { clearInterval(timerInterval); }
function updateTimer() {
  const el = document.getElementById('timerDisplay');
  if (!el) return;
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

// ── Load next problem ─────────────────────────────────────────────────────
function loadNextProblem() {
  currentProblem = pickProblem();
  hintsShown    = 0;
  answered      = false;
  showingAnswer = false;
  stopTimer();
  render();
  if (currentProblem) startTimer();
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const main = document.getElementById('mainArea');
  const pool = getPool();

  if (!currentProblem) {
    main.innerHTML = `<div class="empty-state"><p>No problems match these filters.</p></div>`;
    return;
  }

  const p          = currentProblem;
  const topicLabel = TOPIC_LABELS[p.topic] || p.topic;
  const hintTexts  = [p.hint_level_1, p.hint_level_2, p.hint_level_3].filter(Boolean);

  // Build action buttons HTML
  let actionsHtml = '';
  if (!answered) {
    const canHint = hintsShown < hintTexts.length;
    const remaining = hintTexts.length - hintsShown;
    const hintLabel = canHint ? `Hint ${remaining}/${hintTexts.length}` : `0/${hintTexts.length} hints left`;
    actionsHtml = `
      <button class="btn" id="hintBtn" ${!canHint ? 'disabled' : ''}>
        ${hintLabel}
      </button>
      <button class="btn" id="showAnswerBtn">Show answer</button>
      <button class="btn btn-incorrect" id="incorrectBtn">Incorrect</button>
      <button class="btn btn-correct"   id="correctBtn">Correct</button>`;
  } else {
    actionsHtml = `
      <button class="btn" id="showAnswerBtn">${showingAnswer ? 'Hide answer' : 'Show answer'}</button>
      <button class="btn btn-next" id="nextBtn">Next problem</button>`;
  }

  // Scaffold the card — LaTeX containers are empty divs, filled after injection
  main.innerHTML = `
    <div class="card-wrap">
      <div class="progress-meta">
        <span>${attempts.length} attempt${attempts.length !== 1 ? 's' : ''} this session</span>
        <span>${pool.length} problems in pool</span>
      </div>

      <div class="problem-card">
        <div class="card-meta">
          <span class="topic-label">${topicLabel}</span>
          <span class="diff-label">Difficulty ${p.difficulty}/4</span>
          <span class="problem-id">${p.problem_id}</span>
        </div>

        <div class="problem-statement" id="mathStatement"></div>

        <div class="timer">
          <span id="timerDisplay">0:00</span>
          <span style="color:var(--border)"> / </span>
          <span>est. ${p.estimated_time_min} min</span>
        </div>

        <div class="hints-area" id="hintsArea"></div>
        <div class="action-row">${actionsHtml}</div>
        <div id="answerArea"></div>
      </div>

      <div class="save-status" id="saveStatus"></div>
    </div>
    <div class="log-wrap" id="logWrap"></div>
  `;

  // Attach button events
  document.getElementById('hintBtn')?.addEventListener('click', showHint);
  document.getElementById('correctBtn')?.addEventListener('click',   () => recordAttempt(true));
  document.getElementById('incorrectBtn')?.addEventListener('click', () => recordAttempt(false));
  document.getElementById('nextBtn')?.addEventListener('click', loadNextProblem);
  document.getElementById('showAnswerBtn')?.addEventListener('click', toggleAnswer);

  renderLog();

  // Now render all LaTeX — MathJax is ready by the time the user sees a problem
  renderAllMath();
}

// ── Render all math in the current card ───────────────────────────────────
function renderAllMath() {
  const p = currentProblem;
  if (!p) return;

  // Problem statement — split on ||| (safe delimiter replacing LaTeX \\ line breaks)
  const stmtEl = document.getElementById('mathStatement');
  if (stmtEl) {
    stmtEl.innerHTML = '';
    const lines = p.statement_latex.split('|||');
    lines.forEach((line, i) => {
      const lineDiv = document.createElement('div');
      lineDiv.style.marginBottom = lines.length > 1 && i < lines.length - 1 ? '6px' : '0';
      if (line.trim()) {
        lineDiv.appendChild(latexToNode(line.trim(), false));
      }
      stmtEl.appendChild(lineDiv);
    });
  }

  // Hints
  const hintTexts = [p.hint_level_1, p.hint_level_2, p.hint_level_3].filter(Boolean);
  const hintsArea = document.getElementById('hintsArea');
  if (hintsArea) {
    hintsArea.innerHTML = '';
    for (let i = 0; i < hintsShown; i++) {
      const div = document.createElement('div');
      div.className = 'hint-item';
      const label = document.createElement('strong');
      label.textContent = `Hint ${i + 1}`;
      div.appendChild(label);
      div.appendChild(document.createTextNode(hintTexts[i]));
      hintsArea.appendChild(div);
    }
  }

  // Answer + steps
  if (showingAnswer) {
    const answerArea = document.getElementById('answerArea');
    if (!answerArea) return;

    const steps = Array.isArray(p.solution_steps)
      ? p.solution_steps
      : JSON.parse(p.solution_steps || '[]');

    const box = document.createElement('div');
    box.className = 'answer-box';

    const h4 = document.createElement('h4');
    h4.textContent = 'Answer';
    box.appendChild(h4);

    // Answer latex
    box.appendChild(latexToNode(p.answer_latex, true));

    // Steps
    if (steps.length) {
      const stepsList = document.createElement('div');
      stepsList.className = 'steps-list';

      steps.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'step-item';

        const num = document.createElement('div');
        num.className = 'step-num';
        num.textContent = `${i + 1}.`;

        const content = document.createElement('div');
        content.style.flex = '1';

        const mathDiv = document.createElement('div');
        mathDiv.appendChild(latexToNode(s.step_latex, false));

        const explDiv = document.createElement('div');
        explDiv.className = 'step-expl';
        explDiv.textContent = s.explanation;

        content.appendChild(mathDiv);
        content.appendChild(explDiv);
        item.appendChild(num);
        item.appendChild(content);
        stepsList.appendChild(item);
      });

      box.appendChild(stepsList);
    }

    answerArea.innerHTML = '';
    answerArea.appendChild(box);
  }
}

// ── Hint ──────────────────────────────────────────────────────────────────
function showHint() {
  const hintTexts = [currentProblem.hint_level_1, currentProblem.hint_level_2, currentProblem.hint_level_3].filter(Boolean);
  if (hintsShown < hintTexts.length) {
    hintsShown++;
    sessionHints++;
    updateStats();
    // Re-render hints without rebuilding the whole card
    const hintsArea = document.getElementById('hintsArea');
    if (hintsArea) {
      const div = document.createElement('div');
      div.className = 'hint-item';
      const label = document.createElement('strong');
      label.textContent = `Hint ${hintsShown}`;
      div.appendChild(label);
      div.appendChild(document.createTextNode(hintTexts[hintsShown - 1]));
      hintsArea.appendChild(div);
    }
    // Update hint button
    const hintBtn = document.getElementById('hintBtn');
    if (hintBtn) {
      const canMore = hintsShown < hintTexts.length;
      const remaining = hintTexts.length - hintsShown;
      hintBtn.textContent = canMore
        ? `Hint ${remaining}/${hintTexts.length}`
        : `0/${hintTexts.length} hints left`;
      hintBtn.disabled = !canMore;
    }
  }
}

function toggleAnswer() {
  showingAnswer = !showingAnswer;
  const btn = document.getElementById('showAnswerBtn');
  if (btn) btn.textContent = showingAnswer ? 'Hide answer' : 'Show answer';
  renderAllMath();
}

// ── Record attempt & POST ─────────────────────────────────────────────────
async function recordAttempt(correct) {
  if (!currentProblem || answered) return;
  stopTimer();
  answered = true;

  const studentId = document.getElementById('studentId').value.trim() || 'anonymous';
  const record = {
    student_id:   studentId,
    problem_id:   currentProblem.problem_id,
    topic:        currentProblem.topic,
    difficulty:   currentProblem.difficulty,
    correct:      correct ? 1 : 0,
    hints_used:   hintsShown,
    time_seconds: timerSeconds,
    timestamp:    new Date().toISOString()
  };
  attempts.push(record);
  if (correct) sessionCorrect++;
  updateStats();
  showFeedback(correct);

  // Swap action buttons to show answer / next
  const actionRow = document.querySelector('.action-row');
  if (actionRow) {
    actionRow.innerHTML = `
      <button class="btn" id="showAnswerBtn">Show answer</button>
      <button class="btn btn-next" id="nextBtn">Next problem</button>`;
    document.getElementById('nextBtn').addEventListener('click', loadNextProblem);
    document.getElementById('showAnswerBtn').addEventListener('click', toggleAnswer);
  }

  renderLog();

  // POST to Flask server
  const statusEl = document.getElementById('saveStatus');
  try {
    const res = await fetch(`${SERVER_URL}/attempt`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(record)
    });
    if (res.ok) {
      const data = await res.json();
      if (statusEl) {
        statusEl.textContent = `Saved (attempt #${data.attempt_id})`;
        statusEl.className   = 'save-status saved';
      }
    } else {
      throw new Error('HTTP ' + res.status);
    }
  } catch (err) {
    if (statusEl) {
      statusEl.textContent = 'Not saved — server offline. Use Export CSV.';
      statusEl.className   = 'save-status failed';
    }
  }
}

function showFeedback(correct) {
  const el = document.getElementById('feedback');
  el.textContent = correct ? 'Correct' : 'Incorrect';
  el.className   = `feedback ${correct ? 'correct' : 'incorrect'}`;
  setTimeout(() => { el.className = 'feedback hidden'; }, 1600);
}

function updateStats() {
  document.getElementById('statAttempted').textContent = attempts.length;
  document.getElementById('statCorrect').textContent   = sessionCorrect;
  document.getElementById('statAccuracy').textContent  =
    attempts.length ? Math.round((sessionCorrect / attempts.length) * 100) + '%' : '—';
  document.getElementById('statHints').textContent     = sessionHints;
}

function renderLog() {
  const wrap = document.getElementById('logWrap');
  if (!wrap || attempts.length === 0) return;
  const recent = [...attempts].reverse().slice(0, 15);
  const rows   = recent.map(a => `
    <tr>
      <td>${a.student_id}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${a.problem_id}</td>
      <td>${TOPIC_LABELS[a.topic] || a.topic}</td>
      <td>${a.difficulty}</td>
      <td class="${a.correct ? 'r-correct' : 'r-incorrect'}">${a.correct ? '✓' : '✗'}</td>
      <td>${a.hints_used}</td>
      <td>${a.time_seconds}s</td>
    </tr>`).join('');
  wrap.innerHTML = `
    <div class="log-header">Attempts this session (${attempts.length})</div>
    <table class="log-table">
      <thead><tr>
        <th>Student</th><th>Problem</th><th>Topic</th>
        <th>Diff</th><th>Result</th><th>Hints</th><th>Time</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <button class="export-btn" id="exportBtn">Export CSV</button>
  `;
  document.getElementById('exportBtn')?.addEventListener('click', exportCSV);
}

function exportCSV() {
  const headers = ['student_id','problem_id','topic','difficulty','correct','hints_used','time_seconds','timestamp'];
  const rows    = attempts.map(a => headers.map(h => JSON.stringify(a[h] ?? '')).join(','));
  const csv     = [headers.join(','), ...rows].join('\n');
  const blob    = new Blob([csv], { type: 'text/csv' });
  const a       = document.createElement('a');
  a.href        = URL.createObjectURL(blob);
  a.download    = 'calculus_attempts.csv';
  a.click();
}

// ── Init: wait for MathJax then start ────────────────────────────────────
// MathJax fires 'promise' when fully ready. We wait for that before
// rendering the first problem so tex2chtml is guaranteed to be available.
buildTopics();

if (window.MathJax && MathJax.startup) {
  MathJax.startup.promise.then(() => loadNextProblem());
} else {
  document.getElementById('MathJax-script').addEventListener('load', () => {
    MathJax.startup.promise.then(() => loadNextProblem());
  });
}
</script>
